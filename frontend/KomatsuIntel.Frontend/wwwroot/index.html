<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Komatsu Market Intelligence</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="splash-screen">
            <img src="images/komatsu-logo.svg" alt="Komatsu" class="splash-logo-img" />
            <div class="splash-subtitle">Market Intelligence</div>
            <div class="splash-loader"></div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">&#10006;</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.downloadFile = function (fileName, contentType, content) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = 'data:' + contentType + ';base64,' + content;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
        window.scrollToBottom = function (elementId) {
            const el = document.getElementById(elementId);
            if (el) el.scrollTop = el.scrollHeight;
        };
    </script>
</body>
</html>
